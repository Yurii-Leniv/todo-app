# Used only by the e2e-tests CI job — services here reach each other by
# service name (e.g. "http://backend:8000"), not "localhost".
services:
  backend:
    build: ./backend
    environment:
      JWT_SECRET_KEY: test-secret-key-for-ci
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend

  cypress:
    image: cypress/included:15.18.1
    depends_on:
      - frontend
      - backend
    environment:
      CYPRESS_baseUrl: http://frontend:3000
    working_dir: /e2e
    volumes:
      - ./frontend/cypress:/e2e/cypress
      - ./frontend/cypress.config.ts:/e2e/cypress.config.ts
