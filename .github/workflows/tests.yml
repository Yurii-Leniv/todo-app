name: Tests

on: push

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t todo-backend ./backend

      - name: Check formatting (Black)
        run: docker run --rm todo-backend black --check .

      - name: Lint (Ruff)
        run: docker run --rm todo-backend ruff check .

      - name: Run tests
        run: >
          docker run --rm -e JWT_SECRET_KEY=test-secret-key-for-ci
          todo-backend pytest -v

  frontend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t todo-frontend ./frontend

      - name: Check formatting (Prettier)
        run: docker run --rm todo-frontend npx prettier --check .

      - name: Lint (ESLint)
        run: docker run --rm todo-frontend npm run lint

      - name: Type check
        run: docker run --rm todo-frontend npx tsc --noEmit

      - name: Run unit tests
        run: docker run --rm todo-frontend npm test -- --ci

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit-tests]
    steps:
      - uses: actions/checkout@v4

      # Builds the backend and frontend images, starts both plus a
      # cypress/included container on a shared Docker network, and fails
      # the step if the Cypress run itself fails (not just if any
      # container happens to exit non-zero).
      - name: Run E2E tests
        run: |
          docker compose -f docker-compose.ci.yml up \
            --build --abort-on-container-exit --exit-code-from cypress

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down
