services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        # The browser runs on your host machine, not inside Docker's
        # network, so it reaches the backend via the port published above —
        # not via the "backend" service name (that only works
        # container-to-container, see docker-compose.ci.yml for that case).
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
